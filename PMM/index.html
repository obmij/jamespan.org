function setLang(lang){
  const dict = I18N[lang] || I18N.zh;
  document.documentElement.lang = lang === 'en' ? 'en' : lang === 'cn' ? 'zh-Hans' : 'zh-Hant';
  localStorage.setItem('jp_lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if(dict[key]) el.textContent = dict[key]; });
  document.querySelectorAll('[data-lang-btn]').forEach(btn => btn.classList.toggle('active', btn.dataset.langBtn === lang));
}
document.addEventListener('DOMContentLoaded',()=>setLang(localStorage.getItem('jp_lang') || 'zh'));
