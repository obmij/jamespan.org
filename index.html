<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JamesPan.org｜兒童保護、暴力預防與性教育資源</title><meta name="description" content="JamesPan.org 致力於透過網路提供兒童性教育、暴力預防與孩童照護者教育資源。"><style>:root{--navy:#17375e;--ink:#243246;--muted:#66758a;--bg:#f7fafc;--card:#fff;--line:#dfe8f1;--accent:#2f76bd;--soft:#edf6ff;--warm:#fff7e8}*{box-sizing:border-box}body{margin:0;font-family:Inter,"Noto Sans TC","Noto Sans SC","Noto Sans JP","Noto Sans KR",system-ui,sans-serif;background:var(--bg);color:var(--ink)}a{color:inherit;text-decoration:none}.wrap{width:min(1040px,calc(100% - 40px));margin:auto}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.topin{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:17px 0}.brand{font-weight:900;color:var(--navy);letter-spacing:.02em}.langs{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.langs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;cursor:pointer;font-weight:800}.langs button.active{background:var(--navy);color:#fff}.hero{padding:92px 0 56px;background:linear-gradient(135deg,var(--soft),#fff 55%,var(--warm))}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:900}.hero h1{font-size:clamp(42px,7vw,78px);line-height:1;letter-spacing:-.05em;margin:18px 0;max-width:930px}.lead{font-size:20px;line-height:1.9;color:var(--muted);max-width:900px}.section{padding:64px 0}.article{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:clamp(26px,5vw,48px);box-shadow:0 18px 50px rgba(23,55,94,.07)}.article p{font-size:18px;line-height:2;color:#455268;margin:0 0 1.4em}.article p:last-child{margin-bottom:0}.notice{margin-top:28px;background:linear-gradient(135deg,#17375e,#2f76bd);color:#fff;border-radius:28px;padding:34px}.notice h2{margin:0 0 14px;font-size:clamp(28px,4vw,42px)}.notice p{font-size:18px;line-height:1.85;margin:0;color:rgba(255,255,255,.92)}footer{padding:30px 0;border-top:1px solid var(--line);color:var(--muted)}@media(max-width:760px){.topin{align-items:flex-start}.hero{padding-top:68px}.langs button{padding:7px 10px;font-size:12px}}</style></head><body><header class="top"><div class="wrap topin"><a class="brand" href="/">JAMESPAN.ORG</a><div class="langs" aria-label="Language"><button data-lang="zh-Hant" class="active">正體中文</button><button data-lang="zh-Hans">简体中文</button><button data-lang="en">English</button><button data-lang="ja">日本語</button><button data-lang="ko">한국어</button></div></div></header><main><section class="hero"><div class="wrap"><div class="eyebrow" data-i18n="eyebrow"></div><h1 data-i18n="title"></h1><p class="lead" data-i18n="intro"></p></div></section><section class="section"><div class="wrap"><article class="article"><p data-i18n="p1"></p><p data-i18n="p2"></p><p data-i18n="p3"></p><p data-i18n="p4"></p><div class="notice"><h2 data-i18n="noticeTitle"></h2><p data-i18n="noticeBody"></p></div></article></div></section></main><footer><div class="wrap">© James Pan · jamespan.org</div></footer><script>const t={"zh-Hant":{eyebrow:"兒童保護｜暴力預防｜性教育",title:"預防是關鍵，教育是必要條件。",intro:"我一直深信人性本善。當人變壞或做出傷害他人的行為，追究根本，問題往往來自缺失的教育，以及不適合的孩童照護環境。",p1:"在此時此刻，因孩童而設立的社福機構如雨後春筍般出現，主要仍多半著重於孩子受到侵害後的善後工作，卻鮮少將多數資源投入在事前的暴力預防。傷口可以復原，但多數會留下疤痕；創傷往往是終身的，就像終身帶原的慢性病，也許不會隨時危及生命，卻仍舊會痛。",p2:"暴力加害者，往往不知道過去的自己也早已成為受害者。這樣的惡性循環必須終止，而預防是關鍵，教育則是必要條件。",p3:"我的使命，是藉由網路提供家長與照護者可以取得的教育資源，讓他們知道怎麼教；同時也給孩子多一種學習的管道，幫助他們了解如何分辨危險，並且知道在需要時如何求救。",p4:"保護孩子最有效的方式，並不是時時刻刻把孩子緊緊綁在身邊。更關鍵的是，讓孩子具備保護自己的 know-how、判斷力與實際能力。",noticeTitle:"網站現正在建構中",noticeBody:"未來本站將分成兩個主要分眾：一個讓孩子多一個學習性教育與自我保護的管道；另一個讓家長、教師與其他孩童照護者取得教育資源。內容與功能將陸續完善，敬請拭目以待。"},"zh-Hans":{eyebrow:"儿童保护｜暴力预防｜性教育",title:"预防是关键，教育是必要条件。",intro:"我一直深信人性本善。当一个人变坏或做出伤害他人的行为，追究根本，问题往往来自缺失的教育，以及不合适的儿童照护环境。",p1:"在今天，因儿童而设立的社会福利机构如雨后春笋般出现，但主要仍多半着重于儿童受到侵害后的善后工作，却很少把多数资源投入到事前的暴力预防。伤口可以复原，但多数会留下疤痕；创伤往往是终身的，就像终身携带的慢性病，也许不会随时危及生命，却仍然会痛。",p2:"暴力加害者往往不知道，过去的自己也早已成为受害者。这样的恶性循环必须终止，而预防是关键，教育则是必要条件。",p3:"我的使命，是通过网络为家长与照护者提供可取得的教育资源，让他们知道如何教；同时也给孩子多一种学习途径，帮助他们了解如何分辨危险，并知道在需要时如何求救。",p4:"保护孩子最有效的方式，并不是时时刻刻把孩子紧紧绑在身边。更关键的是，让孩子具备保护自己的知识、判断力与实际能力。",noticeTitle:"网站目前正在建设中",noticeBody:"未来本站将分为两个主要受众：一部分让孩子多一个学习性教育与自我保护的途径；另一部分让家长、教师与其他儿童照护者取得教育资源。内容与功能将陆续完善，敬请期待。"},en:{eyebrow:"Child Protection · Violence Prevention · Sexuality Education",title:"Prevention is the key. Education is essential.",intro:"I have always believed that people are fundamentally good. When someone turns harmful or commits wrongdoing, the root cause is often missing education and an unsuitable caregiving environment during childhood.",p1:"Today, child-focused social welfare organizations continue to grow, yet most resources are still directed toward responding after a child has already been harmed. Far fewer resources are devoted to preventing violence before it happens. Wounds may heal, but scars often remain. Trauma can last a lifetime, much like a chronic condition: it may not always threaten life, but it can still hurt.",p2:"People who cause violence often do not realize that they, too, may have become victims long ago. This cycle must end. Prevention is the key, and education is an essential condition.",p3:"My mission is to use the internet to give parents and caregivers access to educational resources so they know how to teach. At the same time, children should have another way to learn how to recognize danger and how to ask for help when they need it.",p4:"The most effective way to protect children is not to keep them tightly beside us at every moment. What matters more is helping them develop the know-how, judgment, and practical ability to protect themselves.",noticeTitle:"This website is under construction",noticeBody:"The site will eventually serve two main audiences: children, who will gain another channel for learning sexuality education and self-protection; and parents, teachers, and other caregivers, who will be able to access educational resources. More content and features are on the way. Please stay tuned."},ja:{eyebrow:"子どもの保護｜暴力予防｜性教育",title:"予防が鍵であり、教育は不可欠です。",intro:"私は、人は本来善良であると信じています。人が悪い方向へ進み、他者を傷つける行為に及ぶ背景には、教育の欠如や、子ども時代に適切でなかった養育環境があることが少なくありません。",p1:"現在、子どものための福祉機関は増え続けていますが、その多くは被害が起きた後の支援に重点を置いています。暴力が起きる前の予防に十分な資源が配分されることは、まだ多くありません。傷は治っても、傷跡が残ることがあります。トラウマは慢性疾患のように生涯続き、命を常に脅かすわけではなくても、痛みを残します。",p2:"暴力の加害者自身が、過去にすでに被害者だったことに気づいていない場合もあります。この悪循環は終わらせなければなりません。予防が鍵であり、教育は不可欠です。",p3:"私の使命は、インターネットを通じて保護者や養育者が教育資源にアクセスできるようにし、どのように教えるかを支援することです。同時に、子どもたちが危険を見分け、必要なときに助けを求める方法を学べる新たな機会を提供します。",p4:"子どもを守る最も効果的な方法は、常にそばに縛りつけることではありません。より重要なのは、自分を守るための知識、判断力、実践的な力を身につけてもらうことです。",noticeTitle:"本サイトは現在構築中です",noticeBody:"今後、本サイトは主に二つの対象に分かれます。子どもには性教育と自己防衛を学ぶ新たな機会を、保護者・教師・その他の養育者には教育資源を提供します。内容と機能は順次充実させていきます。どうぞご期待ください。"},ko:{eyebrow:"아동 보호｜폭력 예방｜성교육",title:"예방이 핵심이며, 교육은 필수입니다.",intro:"저는 인간은 본래 선하다고 믿습니다. 사람이 잘못된 방향으로 변하거나 타인에게 해를 끼치는 행동을 하게 되는 근본 원인에는 교육의 부재와 적절하지 못한 아동 돌봄 환경이 있는 경우가 많습니다.",p1:"오늘날 아동을 위해 설립된 사회복지 기관은 계속 늘어나고 있지만, 대부분의 자원은 여전히 피해가 발생한 뒤의 지원에 집중되어 있습니다. 폭력이 일어나기 전 예방에 충분한 자원이 배분되는 경우는 드뭅니다. 상처는 아물 수 있지만 흉터가 남을 수 있고, 트라우마는 만성질환처럼 평생 지속될 수 있습니다. 늘 생명을 위협하지는 않더라도 계속 아플 수 있습니다.",p2:"폭력을 가한 사람도 자신이 과거에 이미 피해자였다는 사실을 알지 못하는 경우가 많습니다. 이러한 악순환은 반드시 끝나야 합니다. 예방이 핵심이며, 교육은 필수 조건입니다.",p3:"저의 사명은 인터넷을 통해 부모와 돌봄 제공자가 교육 자료에 접근하여 어떻게 가르쳐야 하는지 알 수 있도록 돕는 것입니다. 동시에 아이들이 위험을 구별하고 필요할 때 도움을 요청하는 방법을 배울 수 있는 또 하나의 학습 경로를 제공하고자 합니다.",p4:"아이를 보호하는 가장 효과적인 방법은 언제나 곁에 붙잡아 두는 것이 아닙니다. 더 중요한 것은 아이가 스스로를 보호할 수 있는 지식, 판단력, 실제 능력을 갖추도록 돕는 것입니다.",noticeTitle:"현재 웹사이트를 구축 중입니다",noticeBody:"앞으로 이 사이트는 두 주요 대상에게 서비스를 제공할 예정입니다. 아이들에게는 성교육과 자기보호를 배울 수 있는 새로운 경로를, 부모·교사·기타 돌봄 제공자에게는 교육 자료를 제공합니다. 콘텐츠와 기능은 순차적으로 보완될 예정이니 기대해 주세요."}};function setLang(l){document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t[l][e.dataset.i18n]);document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));localStorage.setItem('jp-lang',l)}document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));setLang(localStorage.getItem('jp-lang')||'zh-Hant');</script></body></html>
